name: Daily Global Intelligence Engine

on:
  schedule:
    # UTC 23:00 (北京时间早上 7:00)
    - cron: '0 23 * * *'
    # UTC 05:00 (北京时间下午 13:00)
    - cron: '0 5 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    # 🔥 关键1：必须绑定 environment 才能使用 Environment secrets
    environment: main
    
    # 🔥 关键2：必须添加 permissions 才能访问 GitHub Models
    permissions:
      contents: read
      models: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Daily Intelligence Engine
        env:
          # 邮件配置（推荐使用 Gmail）
          # Gmail 配置：SMTP_HOST=smtp.gmail.com, SMTP_PORT=587
          # 需要 Gmail 应用密码（16位，无连字符），不是账户密码
          # 获取方法：https://myaccount.google.com/security → 应用密码
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          
          # 飞书推送（可选）：在仓库或 environment 的 Secrets 中配置 FEISHU_WEBHOOK_URL 后日报会推送到飞书群
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # 报告模式与推送通道（通用可配置架构）
          # REPORT_MODE: both（默认）/ daily_intel / stock（股票情报）/ coal（煤炭情报）
          REPORT_MODE: ${{ secrets.REPORT_MODE || 'both' }}
          # PUSH_CHANNELS: 逗号分隔，如 email,feishu,wecom
          PUSH_CHANNELS: ${{ secrets.PUSH_CHANNELS || 'email,feishu' }}
          # 企业微信群机器人 Webhook（可选）
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          
          # LLM API 配置（使用 GitHub 提供的模型）
          # GitHub Actions 会自动提供 github.token（通过 permissions.models: read）
          # 也可以手动在 Secrets 中配置 GITHUB_TOKEN
          # 🔥 关键：必须设置 permissions.models: read 才能访问 GitHub Models
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          GITHUB_MODEL_NAME: ${{ secrets.GITHUB_MODEL_NAME || 'gpt-4o-mini' }}
        run: |
          # 如果未配置 GITHUB_TOKEN secret，使用 GitHub Actions 自动提供的 token
          if [ -z "$GITHUB_TOKEN" ]; then
            export GITHUB_TOKEN="${{ github.token }}"
          fi
          # 如果未配置 GITHUB_MODEL_NAME，使用默认值
          if [ -z "$GITHUB_MODEL_NAME" ]; then
            export GITHUB_MODEL_NAME="gpt-4o-mini"
          fi
          python main.py
